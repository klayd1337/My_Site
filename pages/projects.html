<html>
  <head>
    <title>My projects</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v6.2.1/css/all.css"
    />
    <link rel="stylesheet" href="../main.css" />
    <link rel="icon" href="../public/favicon.ico" />
  </head>
  <body>
    <header>
      <nav>
        <h3>Navigation</h3>
        <ul>
          <a href="../index.html">
            <li><i class="fa-solid fa-house-user"></i> Home page</li>
          </a>
          <a href="about.html">
            <li><i class="fa-regular fa-address-card"></i> About me</li>
          </a>
          <a href="contact.html">
            <li><i class="fa-regular fa-address-book"></i> Contacts</li>
          </a>
          <a href="tutorials.html">
            <li><i class="fa-solid fa-newspaper"></i> Tutorials</li>
          </a>
          <a href="projects.html">
            <li><i class="fa-solid fa-box-archive"></i> My projects</li>
          </a>
        </ul>
      </nav>
    </header>
    <main>
      <div class="content">
        <div class="game-container">
          <h1>My projects</h1>
          <h2>Eight - головоломка</h2>
          <p style="color: #a0a0b0; margin-bottom: 10px">
            Соберите числа по порядку от 1 до 8. Кликайте по плиткам или
            используйте стрелки.
          </p>
          <div class="game-wrapper">
            <canvas id="canvas" width="300" height="300"></canvas>

            <div class="game-info">
              <div>Ходы: <span id="movesDisplay">0</span></div>
              <div>
                Статус:
                <span id="statusDisplay" style="color: #60c060">Игра</span>
              </div>
            </div>

            <div class="game-controls">
              <button class="game-btn" id="newGameBtn">
                <i class="fas fa-dice"></i> Новая
              </button>
              <button class="game-btn" id="shuffleBtn">
                <i class="fas fa-random"></i> Перемешать
              </button>
              <button class="game-btn" id="resetBtn">
                <i class="fas fa-undo"></i> Сброс
              </button>
            </div>

            <div class="game-status" id="messageDisplay">
              💡 Нажмите на плитку рядом с пустым местом
            </div>
          </div>
        </div>

      </div>
    </main>
    <script src="../js/main.js" type="module"></script>
  </body>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
  </style>
</html>
